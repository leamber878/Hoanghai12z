# ==========================================
#  XcodeGen project spec
#  Dùng: xcodegen generate → mở .xcodeproj
#  Cài: brew install xcodegen
# ==========================================

name: GPSTracker
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  developmentLanguage: vi

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  GPSTracker:
    type: application
    platform: iOS
    sources:
      - path: GPSTracker
        type: group
        createIntermediateGroups: true
    info:
      path: GPSTracker/Resources/Info.plist
      properties:
        UIBackgroundModes:
          - location
          - fetch
          - processing
        NSLocationWhenInUseUsageDescription: "GPS Tracker cần quyền truy cập vị trí để theo dõi lộ trình của bạn khi đang sử dụng app."
        NSLocationAlwaysAndWhenInUseUsageDescription: "GPS Tracker cần quyền truy cập vị trí ngay cả khi app chạy nền để liên tục theo dõi vị trí của bạn."
        UILaunchScreen: {}
        CFBundleDisplayName: "GPS Tracker"
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.gpstracker
        INFOPLIST_FILE: GPSTracker/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          OPTIMIZATION_LEVEL: -Onone
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          OPTIMIZATION_LEVEL: -O
          SWIFT_COMPILATION_MODE: wholemodule
    preBuildScripts:
      - name: "SwiftLint (optional)"
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
