name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Xcode Version
        run: xcodebuild -version

      - name: 🏗️ Generate Project
        working-directory: ios-client
        run: |
          brew install xcodegen
          xcodegen generate
          ls -la

      - name: 🛠️ Build (simulator, no signing)
        id: build
        working-directory: ios-client
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project GPSTracker.xcodeproj \
            -scheme GPSTracker \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee Build/xcodebuild.log

      - name: 📤 Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios-client/Build/xcodebuild.log
          retention-days: 7
