name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test Runner
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ Ubuntu runner works!"
      - run: uname -a

  build:
    name: Build iOS App
    runs-on: macos-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Xcode Version
        run: xcodebuild -version

      - name: 📦 Check files
        working-directory: ios-client
        run: ls -la

      - name: 🏗️ Generate Project
        working-directory: ios-client
        run: |
          brew install xcodegen
          xcodegen generate
          ls -la *.xcodeproj

      - name: 🛠️ Archive
        working-directory: ios-client
        run: |
          xcodebuild clean archive \
            -project GPSTracker.xcodeproj \
            -scheme GPSTracker \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath Build/GPSTracker.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: GPSTracker.xcarchive
          path: ios-client/Build/GPSTracker.xcarchive
          retention-days: 3
