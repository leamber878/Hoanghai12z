name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Generate Project
        working-directory: ios-client
        run: |
          brew install xcodegen
          xcodegen generate

      - name: 🛠️ Build
        id: build
        working-directory: ios-client
        run: |
          set -o pipefail
          mkdir -p Build
          xcodebuild -project GPSTracker.xcodeproj -scheme GPSTracker -configuration Debug -destination "generic/platform=iOS Simulator" clean build CODE_SIGNING_ALLOWED=NO 2>&1 | tee Build/xcodebuild.log

      - name: 📤 Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios-client/Build/xcodebuild.log
          retention-days: 7

      - name: 📤 Upload Archive
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GPSTracker.xcarchive
          path: ios-client/Build/GPSTracker.xcarchive
          retention-days: 3
