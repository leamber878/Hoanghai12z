name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Xcode & Swift Version
        run: |
          xcodebuild -version
          swift --version

      - name: 🏗️ Generate Project
        working-directory: ios-client
        run: |
          brew install xcodegen
          xcodegen generate
          echo "✅ Project:"
          ls -la *.xcodeproj

      - name: 🛠️ Build Archive
        working-directory: ios-client
        run: |
          set -o pipefail
          xcodebuild clean archive \
            -project GPSTracker.xcodeproj \
            -scheme GPSTracker \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath Build/GPSTracker.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log | xcpretty --color --report junit || \
          (echo "=== BUILD FAILED. Raw log tail ===" && tail -100 build.log && exit 1)

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPSTracker.xcarchive
          path: ios-client/Build/GPSTracker.xcarchive
          retention-days: 3
