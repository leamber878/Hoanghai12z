name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Generate Project
        working-directory: ios-client
        run: |
          brew install xcodegen
          xcodegen generate

      - name: 🛠️ Build
        working-directory: ios-client
        run: |
          set -o pipefail
          xcodebuild -project GPSTracker.xcodeproj -scheme GPSTracker -configuration Debug -destination "generic/platform=iOS Simulator" clean build CODE_SIGNING_ALLOWED=NO 2>&1 | tail -100
