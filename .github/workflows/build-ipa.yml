# ==========================================
#  🏗️ Build GPS Tracker iOS App → IPA
# ==========================================

name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Xcode Version
        run: xcodebuild -version

      - name: 🏗️ Generate Xcode Project
        working-directory: ios-client
        run: |
          brew install xcodegen
          xcodegen generate
          echo "✅ Project generated"
          ls -la *.xcodeproj

      - name: 🛠️ Archive
        working-directory: ios-client
        run: |
          PROJECT=$(ls *.xcodeproj | head -1)
          echo "📦 Project: $PROJECT"
          xcodebuild clean archive \
            -project "$PROJECT" \
            -scheme GPSTracker \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath Build/GPSTracker.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPSTracker.xcarchive
          path: ios-client/Build/GPSTracker.xcarchive
          retention-days: 7

      - name: 💬 Done
        run: echo "✅ Build complete! Download .xcarchive from artifacts."
